server:
  address: 0.0.0.0
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/data

app:
  storage:
    path: ./target/uploads

logging:
  level:
    web: TRACE
    org.springframework.web: TRACE
