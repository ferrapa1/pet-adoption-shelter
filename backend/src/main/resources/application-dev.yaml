server:
  address: 0.0.0.0
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # Use Flyway to manage the schema, and Hibernate to validate it.
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  # Disable Spring Boot's default schema/data script handling.
  # This gives full control to Flyway.
  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true

  # Flyway is now the authority for all schema changes.
  flyway:
    enabled: true
    # This tells Flyway where to find the migration scripts.
    locations: classpath:db/migration
