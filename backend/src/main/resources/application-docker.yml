spring:
  datasource:
    url: jdbc:postgresql://db:5432/pas
    username: pas
    password: pas
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/data

app:
  storage:
    path: /storage
