server {
  listen 80;

  # Serve the Angular application
  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy for API calls
  location /api {
    # We use a variable here so nginx doesn't fail on startup if the DNS resolution fails
    # This requires a resolver, the Docker internal resolver is 127.0.0.11
    resolver 127.0.0.11 valid=30s;

    # We set the backend URL using an environment variable
    # The default is the docker-compose service name
    set $backend_url ${NGINX_PROXY_PASS};

    # If the env var is not set, default to the docker-compose name
    if ($backend_url = "") {
        set $backend_url "http://backend:8080";
    }

    proxy_pass $backend_url;

    # Crucial for routing through external proxies/load balancers (like Render's)
    proxy_ssl_server_name on;
    proxy_set_header Host $proxy_host;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
