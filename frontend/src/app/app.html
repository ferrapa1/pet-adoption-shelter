<main class="main">
  <div class="content">
    <div class="left-side">
      <h1>Welcome to {{title()}}!</h1>

      <div style="margin-top: 20px; padding: 20px; background-color: #f5f5f5; border-radius: 8px; color: #333;">
        <h2>Backend Connection Test</h2>
        <p><strong>Message from Spring Boot:</strong></p>

        @if (greetingMessage()) {
          <h3 style="color: #0078d4;">{{ greetingMessage() }}</h3>
        } @else {
          <p><em>Loading greeting...</em></p>
        }
      </div>

      <p style="margin-top: 20px;">
        Congratulations! Your Angular frontend is now talking to your Spring Boot backend!
      </p>
    </div>
  </div>
</main>

<router-outlet />
